    3. Project Settings → Web App → copy config
    4. ใส่ค่าใน FIREBASE_CONFIG ด้านล่าง แล้วบันทึกไฟล์
    ────────────────────────────────────────────────────────────
    ถ้าไม่ใส่ → แอปยังใช้ได้ปกติ บันทึกเฉพาะเครื่องนั้น
    ════════════════════════════════════════════════════════════
  -->

    #pct-sub  { font-size: 11px; color: #6b7280; text-align: right; }

    #progress-fill { height: 100%; background: linear-gradient(90deg,#7c3aed,#06b6d4); transition: width 0.4s ease; }
    #save-msg { font-size: 10px; color: #10b981; margin-top: 4px; letter-spacing: 1px; min-height: 14px; }

      background: rgba(19,19,43,0.98); border-bottom: 1px solid #2a2a5a;
      padding: 16px; display: none;
    }
    #sync-panel-inner { max-width: 640px; margin: 0 auto; }
    .sp-title { font-size: 13px; font-weight: 700; color: #e2e8f0; margin-bottom: 12px; }
    .sp-warn  {
      font-size: 12px; color: #f59e0b; background: rgba(245,158,11,0.1);
      padding: 10px 12px; margin-bottom: 14px; border: 1px solid rgba(245,158,11,0.3);
    }
    .sp-label { font-size: 11px; color: #6b7280; margin-bottom: 6px; }
    .sp-row   { display: flex; gap: 8px; align-items: center; }
    #code-display {
      font-family: monospace; font-size: 20px; font-weight: 800; color: #7c3aed;
      letter-spacing: 4px; padding: 8px 16px;
      background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.3);
      flex: 1; text-align: center;
    }
    .sp-btn {
      border: none; color: #fff; padding: 8px 14px; cursor: pointer;
      font-size: 12px; white-space: nowrap;
    }
    .sp-divider { border-top: 1px solid #2a2a5a; padding-top: 12px; margin-top: 12px; }
    #code-input {
      flex: 1; background: #0d0d1a; border: 1px solid #2a2a5a;
      color: #e2e8f0; padding: 8px 12px;
      font-family: monospace; font-size: 16px; letter-spacing: 3px; outline: none;
      text-transform: uppercase;
    }
    #sync-status { margin-top: 12px; font-size: 11px; color: #374151; line-height: 1.7; }

      width: 100%; background: none; border: none; cursor: pointer;
      padding: 14px 16px; text-align: left; display: flex; align-items: center; gap: 12px;

    .sec-count-p { font-size: 10px; color: #6b7280; }

    .week-cnt  { font-size: 11px; font-weight: 700; white-space: nowrap; }

      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
      cursor: pointer;

    .task:last-child { border-bottom: none; }
    .checkbox  {
      width: 18px; height: 18px; flex-shrink: 0; margin-top: 1px;
      border: 2px solid #2a2a5a; background: transparent;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; cursor: pointer; user-select: none;

    .checkbox.on { border-color: #10b981; background: #10b981; }
    .checkmark { color: #000; font-size: 12px; font-weight: 900; line-height: 1; }
    .task-text {
      font-size: 13px; line-height: 1.5; flex: 1; color: #d1d5db;
      transition: all 0.15s; user-select: none;

  </div>

      </div>

      <div class="sp-label">Sync Code ของคุณ (แชร์ให้อุปกรณ์อื่น)</div>
      <div class="sp-row">
        <div id="code-display">------</div>
        <button class="sp-btn" style="background:#7c3aed" onclick="copyCode()">
          <span id="copy-label">คัดลอก</span>
        </button>
        <button class="sp-btn" style="background:#374151" title="สร้างโค้ดใหม่" onclick="resetCode()">↺</button>
      </div>

      <div class="sp-divider">
        <div class="sp-label">ใส่ Sync Code จากอุปกรณ์อื่น</div>
        <div class="sp-row">
          <input id="code-input" maxlength="8" placeholder="เช่น AB12CD"
            oninput="this.value=this.value.toUpperCase()"
            onkeydown="if(event.key==='Enter') connectCode()" />
          <button class="sp-btn" style="background:#06b6d4" onclick="connectCode()">เชื่อมต่อ</button>
        </div>
      </div>

      <div id="sync-status">สถานะ: <span id="status-text" style="color:#6b7280">บันทึกเฉพาะเครื่อง</span></div>
    </div>
  </div>

  <!-- Main content -->
  <div id="main"></div>
</div>

    },
    {
      id:"month4", emoji:"⚔️", label:"เดือน 4 — เนื้อหาครบ + Balance",
      color:"#f59e0b", bg:"rgba(245,158,11,0.06)", border:"rgba(245,158,11,0.3)",
      goal:"เนื้อหาครบขั้นต่ำ + Balance Testing เสร็จสิ้น",
      weeks:[
        { id:"m4", label:"ทั้งเดือน", title:"Content Checklist + Balance", time:"~32 ชม.", tasks:[
          { id:"m4a", text:"🗺️ โซน 3 แห่ง: ป่า / เหมือง / วิหาร — แต่ละโซนมี 3–5 ห้อง" },
          { id:"m4b", text:"👾 ศัตรู 5 ตัว — เขียน Stats ลงกระดาษก่อน แล้วค่อย Code ประหยัดเวลามาก" },
          { id:"m4c", text:"💊 ไอเทม 3 ชนิด: ยา HP +30 / ยาเพิ่ม Attack ×2 ใน 1 ตา / โล่ลด Damage 50%" },
          { id:"m4d", text:"⬆️ Upgrade 1 อย่าง: เก็บ EXP → เพิ่ม Attack หรือ Max HP" },
          { id:"m4e", text:"🏁 Boss ตัวสุดท้าย → ชนะ → จอ 'Demo End — Thank you for playing!'" },
          { id:"m4f", text:"🧪 Balance Test: ให้คน 2–3 คนเล่น → ถาม 'ยากหรือง่ายเกินไปไหม'" },
          { id:"m4g", text:"📊 ปรับตัวเลข HP/Damage ตามผล → Test อีกรอบ" },
        ]},

    },
    {
      id:"month5", emoji:"🚀", label:"เดือน 5 — Polish + ปล่อยเกม!",

      goal:"Demo บน Itch.io พร้อมรับเงิน — มีคนโหลด 50+ ใน 1 เดือนแรก",
      weeks:[
        { id:"m5w1718", label:"สัปดาห์ 17–18", title:"Polish: Sound + Screen", time:"~16 ชม.", tasks:[
          { id:"m5a", text:"Sound FX: freesound.org → ค้นหา 'RPG attack', 'menu click', 'level up' → CC0 License เท่านั้น" },
          { id:"m5b", text:"BGM: opengameart.org → ค้นหา 'RPG background music'" },
          { id:"m5c", text:"Godot → AudioStreamPlayer Node → เล่นเสียงตามสถานการณ์" },
          { id:"m5d", text:"Title Screen: ชื่อเกม + ปุ่ม 'New Game' + รูปพื้นหลัง" },
          { id:"m5e", text:"Game Over Screen: 'You Died' + ปุ่ม 'Try Again' และ 'Main Menu'" },
          { id:"m5f", text:"เล่น Full Playthrough ตัวเอง → จด Bug → แก้เฉพาะที่รบกวนมาก" },
        ]},
        { id:"m5w19", label:"สัปดาห์ 19", title:"เตรียม Itch.io Page เกม", time:"~8 ชม.", tasks:[
          { id:"m5g", text:"Godot → Export → Web (HTML5) หรือ Windows → Test ว่า export แล้วเล่นได้จริง" },
          { id:"m5h", text:"GIF Gameplay 10–15 วินาที (แสดง Combat + Map)" },
          { id:"m5i", text:"Cover Image ใน Canva 630×500: ชื่อเกม + Screenshot สวยสุด" },
          { id:"m5j", text:"Screenshot 4 รูป: Map, Combat, Inventory, Boss" },
          { id:"m5k", text:"Description: 'What is this?' / 'How to play?' / 'What's in demo?'" },
          { id:"m5l", text:"ตั้งราคา: Pay what you want, min $0, suggested $3 → เปิด 'Accept donations'" },
        ]},
        { id:"m5w20", label:"สัปดาห์ 20 🎉", title:"LAUNCH DAY!", time:"~8 ชม.", tasks:[
          { id:"m5m", text:"Publish เกม → เปิดใน Incognito ตรวจทุกอย่างอีกรอบ" },
          { id:"m5n", text:"โพสต์ประกาศ X/TikTok: 'Demo พร้อมแล้ว!' + GIF + ลิงก์ Itch.io" },
          { id:"m5o", text:"Reddit: r/indiegaming, r/pixelart, r/gamedev — แนะนำตัวก่อน อย่า spam link" },
          { id:"m5p", text:"Discord: Godot Community + Pixel Art Community" },
          { id:"m5q", text:"เช็ค Analytics ทุกวัน → ตอบ Comment ทุกอัน" },
        ]},
      ]
    },
  ];

  const DONT_DO = [
    "เพิ่มโซนมากกว่า 3 โซน",
    "ทำระบบ Crafting หรือ Quest ซับซ้อน",
    "วาดตัวละครเพิ่มก่อนที่ระบบจะทำงานได้",
    "รอให้งานสมบูรณ์ 100% ก่อนปล่อย",
  ];

  // ─── State ───────────────────────────────────────────────────────────────────
  const STORAGE_KEY  = "last-sprite-checklist";
  const SYNCCODE_KEY = "last-sprite-sync-code";

  let checked      = {};
  let openSections = { urgent: true };
  let syncCode     = "";
  let db           = null;
  let unsubscribe  = null;
  let firestoreReady = false;

  // ─── Firebase init ────────────────────────────────────────────────────────────
  async function initFirebase() {
    const cfg = window.FIREBASE_CONFIG;
    if (!cfg || !cfg.apiKey) return;
    try {
      const { initializeApp }  = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
      const { getFirestore, doc, onSnapshot, setDoc, getDoc } =
        await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

      const app = initializeApp(cfg);
      db = getFirestore(app);
      firestoreReady = true;

      window._fs = { doc, onSnapshot, setDoc, getDoc };
    } catch(e) {
      console.warn("Firebase init failed:", e);
    }
  }

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function genCode() {
    return Math.random().toString(36).substring(2, 8).toUpperCase();
  }

  function countAll() {
    return SECTIONS.flatMap(s => s.weeks.flatMap(w => w.tasks)).length;
  }

  function save(next) {
    checked = next;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
    renderProgress();
    renderSections();
  }

  async function saveAndSync(next) {
    save(next);
    // flash save msg
    const msg = document.getElementById("save-msg");
    msg.textContent = "💾 บันทึกแล้ว";
    setTimeout(() => { msg.textContent = ""; }, 800);

    if (firestoreReady && syncCode) {
      const { doc, setDoc } = window._fs;
      try {
        await setDoc(doc(db, "checklists", syncCode), {
          checked: next,
          updatedAt: new Date().toISOString(),
        });
      } catch {}
    }
  }

  // ─── Sync ─────────────────────────────────────────────────────────────────────
  async function connectSync(code) {
    if (!firestoreReady) return;
    const { doc, onSnapshot, getDoc } = window._fs;

    if (unsubscribe) { unsubscribe(); unsubscribe = null; }

    const ref = doc(db, "checklists", code);

    // pull latest
    try {
      const snap = await getDoc(ref);
      if (snap.exists()) {
        const data = snap.data().checked;
        if (data) save(data);
      }
    } catch {}

    // real-time listener
    unsubscribe = onSnapshot(ref, snap => {
      if (snap.exists() && !snap.metadata.hasPendingWrites) {
        const data = snap.data().checked;
        if (data) save(data);
      }
      setStatus("connected");
    }, () => setStatus("error"));
  }

  // ─── Status ──────────────────────────────────────────────────────────────────
  function setStatus(s) {
    const dot   = document.getElementById("status-dot");
    const label = document.getElementById("status-label");
    const text  = document.getElementById("status-text");
    const colors = { local:"#6b7280", connected:"#10b981", error:"#ef4444" };
    const names  = { local:"บันทึกเฉพาะเครื่อง", connected:"ซิงค์แล้ว", error:"ไม่ได้เชื่อมต่อ" };
    dot.style.background   = colors[s];
    label.style.color      = colors[s];
    text.style.color       = colors[s];
    text.textContent       = names[s];
    if (s === "connected") {
      text.textContent += ` · โค้ด ${syncCode}`;
    }
  }

  // ─── UI helpers ──────────────────────────────────────────────────────────────
  window.toggleSyncPanel = function() {
    const p = document.getElementById("sync-panel");
    p.style.display = p.style.display === "none" ? "block" : "none";
  };

  window.copyCode = function() {
    navigator.clipboard.writeText(syncCode).then(() => {
      const btn = document.getElementById("copy-label");
      btn.textContent = "✓ คัดลอกแล้ว";
      setTimeout(() => { btn.textContent = "คัดลอก"; }, 2000);
    });
  };

  window.resetCode = function() {
    const code = genCode();
    localStorage.setItem(SYNCCODE_KEY, code);
    syncCode = code;
    document.getElementById("code-display").textContent = code;
    connectSync(code);
    setStatus("local");
  };

  window.connectCode = function() {
    const inp = document.getElementById("code-input");
    const code = inp.value.trim().toUpperCase();
    if (code.length < 4) return;
    localStorage.setItem(SYNCCODE_KEY, code);
    syncCode = code;
    inp.value = "";
    document.getElementById("code-display").textContent = code;
    document.getElementById("sync-panel").style.display = "none";
    connectSync(code);
    setStatus("local");
  };

  window.toggleSection = function(id) {
    openSections[id] = !openSections[id];
    renderSections();
  };

  window.toggle = async function(taskId) {
    const next = { ...checked, [taskId]: !checked[taskId] };
    await saveAndSync(next);
  };

  // ─── Render ──────────────────────────────────────────────────────────────────
  function renderProgress() {
    const total = countAll();
    const done  = Object.values(checked).filter(Boolean).length;
    const pct   = total ? Math.round((done / total) * 100) : 0;
    document.getElementById("pct-big").textContent  = pct + "%";
    document.getElementById("pct-big").style.color  = pct === 100 ? "#10b981" : "#fff";
    document.getElementById("pct-sub").textContent  = `${done}/${total} ข้อ`;
    document.getElementById("progress-fill").style.width = pct + "%";
  }

  function renderSections() {
    const main = document.getElementById("main");

    let html = "";

    for (const section of SECTIONS) {
      const tasks = section.weeks.flatMap(w => w.tasks);
      const sdone = tasks.filter(t => checked[t.id]).length;
      const stotal = tasks.length;
      const spct = stotal ? Math.round((sdone / stotal) * 100) : 0;
      const isOpen = !!openSections[section.id];

      html += `
        <div class="section" style="border-color:${section.border};background:${section.bg}">
          <button class="sec-header" onclick="toggleSection('${section.id}')">
            <span class="sec-emoji">${section.emoji}</span>
            <div class="sec-info">
              <div class="sec-label">${section.label}</div>
              <div class="sec-goal">${section.goal}</div>
            </div>
            <div class="sec-count">
              <div class="sec-count-n" style="color:${section.color}">${sdone}/${stotal}</div>
              <div class="sec-count-p">${spct}%</div>
            </div>
            <span class="sec-arrow">${isOpen ? "▲" : "▼"}</span>
          </button>
          <div class="sec-progress">
            <div class="sec-progress-fill" style="width:${spct}%;background:${section.color}"></div>
          </div>
      `;

      if (isOpen) {
        html += `<div class="sec-body">`;
        for (const week of section.weeks) {
          const wdone = week.tasks.filter(t => checked[t.id]).length;
          const wall  = week.tasks.length;
          html += `
            <div class="week">
              <div class="week-header">
                <span class="week-lbl">${week.label}</span>
                <span class="week-title">${week.title}</span>
                <span class="week-time">${week.time}</span>
                <span class="week-cnt" style="color:${wdone===wall?'#10b981':'#6b7280'}">${wdone}/${wall}</span>
              </div>
              <div class="tasks">
          `;
          for (const task of week.tasks) {
            const on = !!checked[task.id];
            html += `
              <div class="task" onclick="toggle('${task.id}')">
                <div class="checkbox ${on ? 'on' : ''}">
                  ${on ? '<span class="checkmark">✓</span>' : ''}
                </div>
                <span class="task-text ${on ? 'done' : ''}">${task.text}</span>
              </div>
            `;
          }
          html += `</div></div>`;
        }
        html += `</div>`;
      }

      html += `</div>`;
    }

    // Dont-do section
    html += `
      <div id="dontdo">
        <div class="dd-title">⚠️ ห้ามทำก่อนปล่อย Demo</div>
        ${DONT_DO.map(d => `
          <div class="dd-item">
            <span class="dd-x">✕</span>
            <span>${d}</span>
          </div>
        `).join("")}
        <div class="dd-rule">
          <strong style="color:#fcd34d">กฎ:</strong>
          <span style="color:#e2e8f0"> ถ้าเล่นได้และไม่ Crash — ปล่อยได้แล้ว</span>
        </div>
      </div>
      <div id="footer">THE LAST SPRITE · พฤษภาคม 2026</div>
    `;

    main.innerHTML = html;
  }

  // ─── Boot ────────────────────────────────────────────────────────────────────
  async function boot() {
    // Load local data
    try {
      const local = localStorage.getItem(STORAGE_KEY);
      if (local) checked = JSON.parse(local);
    } catch {}

    // Setup sync code
    syncCode = localStorage.getItem(SYNCCODE_KEY) || genCode();
    localStorage.setItem(SYNCCODE_KEY, syncCode);
    document.getElementById("code-display").textContent = syncCode;

    // Try Firebase
    await initFirebase();

    if (!firestoreReady) {
      document.getElementById("sp-warn").style.display = "block";
      setStatus("local");
    } else {
      await connectSync(syncCode);
    }

    // Render
    renderProgress();
    renderSections();

    // Show app
    document.getElementById("loading").style.display = "none";
    document.getElementById("app").style.display     = "block";
  }

  boot();
</script>
